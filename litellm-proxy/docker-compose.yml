services:
  litellm:
    # Same image family as https://docs.litellm.ai/docs/proxy/docker_quick_start
    image: docker.litellm.ai/berriai/litellm:main-latest
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
    command:
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      # Verbose: logs enough to confirm every HTTP hit (path, routing). May include prompts — turn off when done.
      - "--detailed_debug"
    environment:
      - LITELLM_LOG=DEBUG
    extra_hosts:
      # Linux: map host.docker.internal to the host gateway (Docker 20.10+).
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
